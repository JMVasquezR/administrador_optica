<div id="edit-patient-form" class="patients-view" style="display: none;">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold text-dark">Editar Paciente</h2>
        <button class="btn btn-outline-secondary" onclick="showPatientsList()">
            <i class="fas fa-arrow-left me-2"></i>
            Volver al Listado
        </button>
    </div>

    <div class="row">
        <div class="col-lg-8">
            <div class="card">
                <div class="card-header bg-white">
                    <h5 class="card-title mb-0">
                        <i class="fas fa-user-edit text-red-custom me-2"></i>
                        Información Personal
                    </h5>
                </div>
                <div class="card-body">
                    <form id="editPatientForm">
                        <input type="hidden" id="editPatientId" value="">
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="editPatientFirstName" class="form-label">Nombres <span
                                        class="text-danger">*</span></label>
                                <input type="text" class="form-control" id="editPatientFirstName"
                                       placeholder="Nombres completos" required maxlength="250">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="editPatientSurname" class="form-label">Apellido Paterno <span
                                        class="text-danger">*</span></label>
                                <input type="text" class="form-control" id="editPatientSurname"
                                       placeholder="Apellido paterno" required maxlength="100">
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="editPatientSecondSurname" class="form-label">Apellido
                                    Materno</label>
                                <input type="text" class="form-control" id="editPatientSecondSurname"
                                       placeholder="Apellido materno" maxlength="100">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="editPatientDateOfBirth" class="form-label">Fecha de
                                    Nacimiento</label>
                                <input type="date" class="form-control" id="editPatientDateOfBirth">
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-4 mb-3">
                                <label for="editPatientTypeDocument" class="form-label">Tipo de Documento
                                    <span
                                            class="text-danger">*</span></label>
                                <select class="form-select" id="editPatientTypeDocument" required>
                                    <option value="">Seleccionar tipo</option>
                                    <!-- Los tipos se cargarán dinámicamente -->
                                </select>
                            </div>
                            <div class="col-md-4 mb-3">
                                <label for="editPatientDocumentNumber" class="form-label">Número de
                                    Documento <span
                                            class="text-danger">*</span></label>
                                <input type="text" class="form-control" id="editPatientDocumentNumber"
                                       placeholder="Número de documento" required maxlength="25">
                            </div>
                            <div class="col-md-4 mb-3">
                                <label for="editPatientGender" class="form-label">Género <span
                                        class="text-danger">*</span></label>
                                <select class="form-select" id="editPatientGender" required>
                                    <option value="">Seleccionar género</option>
                                    <option value="M">Masculino</option>
                                    <option value="F">Femenino</option>
                                </select>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="editPatientPhone" class="form-label">Teléfono o Celular</label>
                                <input type="tel" class="form-control" id="editPatientPhone"
                                       placeholder="Número de contacto" maxlength="150">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="editPatientEmail" class="form-label">Correo Electrónico</label>
                                <input type="email" class="form-control" id="editPatientEmail"
                                       placeholder="correo@ejemplo.com">
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="editPatientDirection" class="form-label">Dirección</label>
                            <textarea class="form-control" id="editPatientDirection" rows="3"
                                      placeholder="Dirección completa..." maxlength="500"></textarea>
                        </div>

                        <div class="d-flex justify-content-end gap-2">
                            <button type="button" class="btn btn-outline-secondary"
                                    onclick="showPatientsList()">
                                <i class="fas fa-times me-2"></i>
                                Cancelar
                            </button>
                            <button type="submit" class="btn btn-red-custom">
                                <i class="fas fa-save me-2"></i>
                                Actualizar Paciente
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <div class="col-lg-4">
            <div class="card">
                <div class="card-header bg-white">
                    <h6 class="card-title mb-0">
                        <i class="fas fa-history text-red-custom me-2"></i>
                        Historial del Paciente
                    </h6>
                </div>
                <div class="card-body">
                    <div class="alert alert-warning">
                        <i class="fas fa-exclamation-triangle me-2"></i>
                        <strong>Atención:</strong>
                        <ul class="mb-0 mt-2">
                            <li>Los campos marcados con <span class="text-danger">*</span> son obligatorios
                            </li>
                            <li>Los cambios se aplicarán inmediatamente</li>
                            <li>Verifica los datos antes de guardar</li>
                        </ul>
                    </div>

                    <div class="mt-3">
                        <h6 class="fw-bold">Acciones Rápidas</h6>
                        <div class="d-grid gap-2">
                            <button class="btn btn-outline-primary btn-sm">
                                <i class="fas fa-eye me-2"></i>
                                Ver Historial Médico
                            </button>
                            <button class="btn btn-outline-success btn-sm">
                                <i class="fas fa-calendar-plus me-2"></i>
                                Programar Cita
                            </button>
                            <button class="btn btn-outline-info btn-sm">
                                <i class="fas fa-prescription me-2"></i>
                                Nueva Prescripción
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
