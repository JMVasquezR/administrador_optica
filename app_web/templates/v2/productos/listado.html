{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventario | Óptica KyM Lens</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="{% static 'v2/base.css' %}" rel="stylesheet">
</head>
<body>

<div id="page-loader">
    <div class="text-center">
        <div class="spinner-border text-danger" style="width: 3rem; height: 3rem;" role="status">
            <span class="visually-hidden">Cargando...</span>
        </div>
        <h6 class="mt-3 fw-bold text-dark">Óptica KyM Lens</h6>
    </div>
</div>

<div class="container-fluid">
    <div class="row">
        {% include 'v2/menu.html' %}

        <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h3 class="fw-bold"><i class="fas fa-boxes me-2 text-danger"></i>Inventario</h3>
                <button class="btn btn-danger" data-bs-toggle="modal" data-bs-target="#modalProduct">
                    <i class="fas fa-plus me-1"></i> Registrar
                </button>
            </div>

            <div class="table-container p-3 mb-4 bg-white shadow-sm rounded">
                <div class="row g-3">
                    <div class="col-md-4">
                        <div class="input-group">
                                    <span class="input-group-text bg-white border-end-0"><i
                                            class="fas fa-search text-muted"></i></span>
                            <input type="text" id="filter-search" class="form-control border-start-0"
                                   placeholder="Buscar por nombre o código...">
                        </div>
                    </div>
                    <div class="col-md-3">
                        <select id="filter-category" class="form-select">
                            <option value="">Todas las Categorías</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <select id="filter-brand" class="form-select">
                            <option value="">Todas las Marcas</option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <button class="btn btn-outline-dark w-100" id="btn-clear-filters">
                            <i class="fas fa-eraser me-1"></i> Limpiar
                        </button>
                    </div>
                </div>
            </div>

            <div class="table-container p-3 bg-white shadow-sm rounded">
                <div class="table-responsive">
                    <table class="table table-hover align-middle">
                        <thead class="thead-custom">
                        <tr>
                            <th>Código</th>
                            <th>Producto / Marca</th>
                            <th class="text-center">Categoría</th>
                            <th class="text-center">Stock</th>
                            <th class="text-center">Precio</th>
                            <th class="text-center">Estado</th>
                            <th class="text-end pe-3">Acciones</th>
                        </tr>
                        </thead>
                        <tbody id="product-table-body">
                        </tbody>
                    </table>
                    <div class="d-flex justify-content-between align-items-center mt-3 px-3">
                        <div class="text-muted small">
                            Mostrando <span id="current-count">0</span> de <span id="total-count">0</span> productos
                        </div>
                        <nav aria-label="Navegación de inventario">
                            <ul class="pagination mb-0">
                                <li class="page-item">
                                    <button class="btn btn-outline-dark btn-sm me-2" id="prev-page" disabled>Anterior
                                    </button>
                                </li>
                                <li class="page-item">
                                    <button class="btn btn-outline-dark btn-sm" id="next-page" disabled>Siguiente
                                    </button>
                                </li>
                            </ul>
                        </nav>
                    </div>
                </div>
            </div>
        </main>

        <div class="modal fade" id="modalProduct" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1"
             aria-hidden="true">
            <div class="modal-dialog modal-lg">
                <div class="modal-content">
                    <div class="modal-header bg-dark text-white">
                        <h5 class="modal-title" id="modalProductLabel font-weight-bold">
                            <i class="fas fa-glasses me-2 text-danger"></i> <span
                                id="form-title">Registrar Producto</span>
                        </h5>
                        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"
                                aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <form id="product-form">
                            <input type="hidden" id="product-id">
                            <div class="row g-3">
                                <div class="col-md-8">
                                    <label class="form-label fw-bold">Nombre del Producto</label>
                                    <input type="text" id="name" class="form-control" placeholder="Ej: Lente Aviador"
                                           required>
                                </div>

                                <div class="col-md-4">
                                    <label class="form-label fw-bold text-muted">Código (Autogenerado)</label>
                                    <input type="text" id="code" class="form-control bg-light" readonly
                                           placeholder="OPTCASKY...">
                                </div>

                                <div class="col-md-6">
                                    <label class="form-label fw-bold">Categoría</label>
                                    <select id="category" class="form-select" required>
                                        <option value="">Seleccione Categoría...</option>
                                    </select>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-bold">Marca</label>
                                    <select id="brand" class="form-select">
                                        <option value="">Seleccione Marca...</option>
                                    </select>
                                </div>

                                <div class="col-md-4">
                                    <label class="form-label fw-bold">Precio (S/)</label>
                                    <input type="number" step="0.01" id="unit_price" class="form-control"
                                           placeholder="0.00" required>
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label fw-bold">Stock Inicial</label>
                                    <input type="number" id="initial_stock" class="form-control" value="0" required>
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label fw-bold">Unidad de Medida</label>
                                    <select id="unit_measure" class="form-select" required>
                                        <option value="UNIDAD">UNIDAD</option>
                                        <option value="PAR">PAR</option>
                                        <option value="CAJA">CAJA</option>
                                    </select>
                                </div>

                                <div class="col-12">
                                    <label class="form-label fw-bold">Descripción</label>
                                    <textarea id="description" class="form-control" rows="2"
                                              placeholder="Detalles del producto..."></textarea>
                                </div>

                                <div class="col-12">
                                    <div class="form-check form-switch">
                                        <input class="form-check-input" type="checkbox" id="status" checked>
                                        <label class="form-check-label fw-bold" for="status">Producto Activo</label>
                                    </div>
                                </div>
                            </div>
                        </form>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-outline-dark" data-bs-dismiss="modal">Cancelar</button>
                        <button type="submit" form="product-form" class="btn btn-danger">
                            <i class="fas fa-save me-1"></i> Guardar Producto
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div class="modal fade" id="deleteModal" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1"
             aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered modal-sm">
                <div class="modal-content">
                    <div class="modal-body text-center p-4">
                        <i class="fas fa-exclamation-circle fa-3x text-danger mb-3"></i>
                        <h5>¿Estás seguro?</h5>
                        <p class="text-muted small">Esta acción no se puede deshacer.</p>
                        <div class="d-flex justify-content-center gap-2">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">No</button>
                            <button type="button" id="confirmDelete" class="btn btn-danger">Sí, eliminar</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
        <script src="{% static 'v2/productos/productos.js' %}"></script>

        <script>
            // Solo para mostrar el loader cuando el usuario cambia de página desde el menú lateral
            document.addEventListener('click', (e) => {
                const link = e.target.closest('a.nav-link, .card-menu');
                if (link && link.href && !link.href.includes('#') && link.target !== '_blank') {
                    document.getElementById('page-loader').classList.remove('loader-hidden');
                }
            });
        </script>
    </div>
</div>
</body>
</html>
