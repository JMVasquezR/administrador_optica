{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marcas | {{ user.perfil.optica.nombre }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="{% static 'v2/base.css' %}" rel="stylesheet">
</head>
<body>

<div id="page-loader">
    <div class="text-center">
        <div class="spinner-border text-danger" style="width: 3rem; height: 3rem;" role="status">
            <span class="visually-hidden">Cargando...</span>
        </div>
        <h6 class="mt-3 fw-bold text-dark">{{ user.perfil.optica.nombre }}</h6>
    </div>
</div>

<div class="container-fluid">
    <div class="row">
        {% include 'v2/menu.html' %}

        <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h3 class="fw-bold m-0">
                    <i class="fas fa-copyright me-2 text-danger"></i>Marcas de Productos
                </h3>
                <button class="btn btn-danger shadow-sm" onclick="prepareNewBrand()">
                    <i class="fas fa-plus-circle me-1"></i> Nueva Marca
                </button>
            </div>

            <div class="table-container p-3">
                <div class="table-responsive">
                    <div class="table-container p-3 mb-4">
                        <div class="row g-2">
                            <div class="col-md-9">
                                <input type="text" id="brand-search" class="form-control"
                                       placeholder="Buscar marca por nombre (Ej: Ray-Ban, Oakley)...">
                            </div>
                            <div class="col-md-3">
                                <button class="btn btn-outline-dark w-100" id="btn-clear-filters">
                                    <i class="fas fa-eraser me-1"></i> Limpiar
                                </button>
                            </div>
                        </div>
                    </div>

                    <table class="table table-hover align-middle">
                        <thead class="thead-custom">
                        <tr>
                            <th class="ps-4">Nombre de la Marca</th>
                            <th>Descripción / Origen</th>
                            <th class="text-center">Estado</th>
                            <th class="text-end pe-4">Acciones</th>
                        </tr>
                        </thead>
                        <tbody id="brand-table-body">
                        </tbody>
                    </table>

                    <div class="d-flex justify-content-between align-items-center mt-3 px-3">
                        <div class="text-muted small">
                            Mostrando <span id="current-count">0</span> marcas
                        </div>
                        <nav aria-label="Navegación">
                            <ul class="pagination mb-0">
                                <li class="page-item">
                                    <button class="btn btn-outline-dark btn-sm me-2" id="prev-page" disabled>Anterior
                                    </button>
                                </li>
                                <li class="page-item">
                                    <button class="btn btn-outline-dark btn-sm" id="next-page" disabled>Siguiente
                                    </button>
                                </li>
                            </ul>
                        </nav>
                    </div>
                </div>
            </div>
        </main>
    </div>
</div>

<div class="modal fade" id="modalBrand" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1"
     aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg">
            <div class="modal-header bg-dark text-white">
                <h5 class="modal-title">Gestionar Marca</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="brand-form">
                    <input type="hidden" id="brand-id">
                    <div class="mb-3">
                        <label class="form-label fw-bold small">Nombre de la Marca</label>
                        <input type="text" id="brand-name" class="form-control" placeholder="Ej: Ray-Ban" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold small">Descripción u Observaciones</label>
                        <textarea id="brand-description" class="form-control" rows="3"
                                  placeholder="Detalles opcionales..."></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer bg-light">
                <button type="button" class="btn btn-outline-dark" data-bs-dismiss="modal">Cerrar</button>
                <button type="submit" form="brand-form" class="btn btn-danger px-4">
                    <i class="fas fa-save me-1"></i> Guardar Marca
                </button>
            </div>
        </div>
    </div>
</div>

<div class="toast-container position-fixed top-0 end-0 p-3" style="z-index: 1200">
    <div id="liveToast" class="toast align-items-center text-white border-0" role="alert" aria-live="assertive"
         aria-atomic="true">
        <div class="d-flex">
            <div class="toast-body" id="toast-message"></div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"
                    aria-label="Close"></button>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="{% static 'v2/marcas/marcas.js' %}"></script>

<script>
    // Loader al navegar
    document.addEventListener('click', (e) => {
        const link = e.target.closest('a.nav-link');
        if (link && link.href && !link.href.includes('#') && link.target !== '_blank') {
            document.getElementById('page-loader').classList.remove('loader-hidden');
        }
    });
</script>
</body>
</html>
