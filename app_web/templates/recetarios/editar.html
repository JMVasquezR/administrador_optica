<div id="edit-recipe-form" class="recipes-view" style="display: none;">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold text-dark">Editar Recetario</h2>
        <button class="btn btn-outline-secondary" onclick="showRecipesList()">
            <i class="fas fa-arrow-left me-2"></i>
            Volver al Listado
        </button>
    </div>

    <div class="row">
        <div class="col-lg-12">
            <div class="card">
                <div class="card-header bg-white">
                    <h5 class="card-title mb-0">
                        <i class="fas fa-edit text-red-custom me-2"></i>
                        Información del Recetario
                    </h5>
                </div>
                <div class="card-body">
                    <form id="editRecipeForm">
                        <input type="hidden" id="editRecipeId" value="">
                        <div class="row">
                            <div class="col-md-4 mb-3">
                                <label for="editRecipePrescriptionNumber" class="form-label">Número de
                                    Recetario</label>
                                <input type="text" class="form-control bg-light"
                                       id="editRecipePrescriptionNumber" readonly>
                                <small class="text-muted">El número de recetario no se puede
                                    modificar</small>
                            </div>
                            <div class="col-md-4 mb-3">
                                <label for="editRecipePatient" class="form-label">Paciente <span
                                        class="text-danger">*</span></label>
                                <select class="form-select" id="editRecipePatient" required>
                                    <option value="">Seleccionar paciente</option>
                                    <!-- Los pacientes se cargarán dinámicamente -->
                                </select>
                            </div>
                            <div class="col-md-4 mb-3">
                                <label for="editRecipeDateOfIssue" class="form-label">Fecha de Emisión <span
                                        class="text-danger">*</span></label>
                                <input type="date" class="form-control" id="editRecipeDateOfIssue" required>
                            </div>
                        </div>

                        <!-- Distancia (Lejos) -->
                        <div class="card mb-4">
                            <div class="card-header bg-light">
                                <h6 class="mb-0"><i class="fas fa-eye me-2"></i>Distancia (Lejos)</h6>
                            </div>
                            <div class="card-body">
                                <div class="row">
                                    <div class="col-md-6">
                                        <h6 class="text-muted mb-3">Ojo Derecho (O.D.)</h6>
                                        <div class="row">
                                            <div class="col-md-4 mb-3">
                                                <label class="form-label">Esférico</label>
                                                <input type="number" step="0.25" class="form-control"
                                                       id="editRightEyeSphericalDistanceFar"
                                                       placeholder="0.00">
                                            </div>
                                            <div class="col-md-4 mb-3">
                                                <label class="form-label">Cilindro</label>
                                                <input type="number" step="0.25" class="form-control"
                                                       id="editRightEyeCylinderDistanceFar"
                                                       placeholder="0.00">
                                            </div>
                                            <div class="col-md-4 mb-3">
                                                <label class="form-label">Eje</label>
                                                <input type="number" step="any" class="form-control"
                                                       id="editRightEyeAxisDistanceFar" placeholder="0">
                                            </div>
                                        </div>
                                    </div>
                                    <div class="col-md-6">
                                        <h6 class="text-muted mb-3">Ojo Izquierdo (O.I.)</h6>
                                        <div class="row">
                                            <div class="col-md-4 mb-3">
                                                <label class="form-label">Esférico</label>
                                                <input type="number" step="0.25" class="form-control"
                                                       id="editLeftEyeSphericalDistanceFar"
                                                       placeholder="0.00">
                                            </div>
                                            <div class="col-md-4 mb-3">
                                                <label class="form-label">Cilindro</label>
                                                <input type="number" step="0.25" class="form-control"
                                                       id="editLeftEyeCylinderDistanceFar"
                                                       placeholder="0.00">
                                            </div>
                                            <div class="col-md-4 mb-3">
                                                <label class="form-label">Eje</label>
                                                <input type="number" class="form-control" step="any"
                                                       id="editLeftEyeAxisDistanceFar" placeholder="0">
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                <div class="row">
                                    <div class="col-md-6">
                                        <label class="form-label">Distancia Pupilar</label>
                                        <input type="number" step="0.5" class="form-control"
                                               id="editPupillaryDistanceFar" placeholder="0.0">
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Cerca -->
                        <div class="card mb-4">
                            <div class="card-header bg-light">
                                <h6 class="mb-0"><i class="fas fa-book-open me-2"></i>Cerca</h6>
                            </div>
                            <div class="card-body">
                                <div class="row">
                                    <div class="col-md-6">
                                        <h6 class="text-muted mb-3">Ojo Derecho (O.D.)</h6>
                                        <div class="row">
                                            <div class="col-md-4 mb-3">
                                                <label class="form-label">Esférico</label>
                                                <input type="number" step="any" class="form-control"
                                                       id="editRightEyeSphericalDistanceNear"
                                                       placeholder="0.00">
                                            </div>
                                            <div class="col-md-4 mb-3">
                                                <label class="form-label">Cilindro</label>
                                                <input type="number" step="0.25" class="form-control"
                                                       id="editRightEyeCylinderDistanceNear"
                                                       placeholder="0.00">
                                            </div>
                                            <div class="col-md-4 mb-3">
                                                <label class="form-label">Eje</label>
                                                <input type="number" step="any" class="form-control"
                                                       id="editRightEyeAxisDistanceNear" placeholder="0">
                                            </div>
                                        </div>
                                    </div>
                                    <div class="col-md-6">
                                        <h6 class="text-muted mb-3">Ojo Izquierdo (O.I.)</h6>
                                        <div class="row">
                                            <div class="col-md-4 mb-3">
                                                <label class="form-label">Esférico</label>
                                                <input type="number" step="0.25" class="form-control"
                                                       id="editLeftEyeSphericalDistanceNear"
                                                       placeholder="0.00">
                                            </div>
                                            <div class="col-md-4 mb-3">
                                                <label class="form-label">Cilindro</label>
                                                <input type="number" step="0.25" class="form-control"
                                                       id="editLeftEyeCylinderDistanceNear"
                                                       placeholder="0.00">
                                            </div>
                                            <div class="col-md-4 mb-3">
                                                <label class="form-label">Eje</label>
                                                <input type="number" class="form-control" step="any"
                                                       id="editLeftEyeAxisDistanceNear" placeholder="0">
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                <div class="row">
                                    <div class="col-md-6">
                                        <label class="form-label">Distancia Pupilar</label>
                                        <input type="number" step="0.5" class="form-control"
                                               id="editPupillaryDistanceNear" placeholder="0.0">
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Observaciones e Instrucciones -->
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="editRecipeObservation" class="form-label">Observaciones</label>
                                <textarea class="form-control" id="editRecipeObservation" rows="4"
                                          placeholder="Observaciones adicionales..."></textarea>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="editRecipeInstruction" class="form-label">Instrucciones</label>
                                <textarea class="form-control" id="editRecipeInstruction" rows="4"
                                          placeholder="Instrucciones para el paciente..."></textarea>
                            </div>
                        </div>

                        <!-- Estado -->
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Estado del Recetario</label>
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="editRecipeStatus"
                                           id="editRecipeStatusActive" value="true" checked>
                                    <label class="form-check-label" for="editRecipeStatusActive">
                                        <i class="fas fa-check-circle text-success me-1"></i>
                                        Activo
                                    </label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="editRecipeStatus"
                                           id="editRecipeStatusInactive" value="false">
                                    <label class="form-check-label" for="editRecipeStatusInactive">
                                        <i class="fas fa-pause-circle text-warning me-1"></i>
                                        Inactivo
                                    </label>
                                </div>
                            </div>
                        </div>

                        <div class="d-flex justify-content-end gap-2">
                            <button type="button" class="btn btn-outline-secondary"
                                    onclick="showRecipesList()">
                                <i class="fas fa-times me-2"></i>
                                Cancelar
                            </button>
                            <button type="submit" class="btn btn-red-custom">
                                <i class="fas fa-save me-2"></i>
                                Actualizar Recetario
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
