<div id="add-recipe-form" class="recipes-view" style="display: none;">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold text-dark">Agregar Nuevo Recetario</h2>
        <button class="btn btn-outline-secondary" onclick="showRecipesList()">
            <i class="fas fa-arrow-left me-2"></i>
            Volver al Listado
        </button>
    </div>

    <div class="row">
        <div class="col-lg-12">
            <div class="card">
                <div class="card-header bg-white">
                    <h5 class="card-title mb-0">
                        <i class="fas fa-prescription text-red-custom me-2"></i>
                        Información del Recetario
                    </h5>
                </div>
                <div class="card-body">
                    <form id="addRecipeForm">
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="recipePatient" class="form-label">Paciente <span
                                        class="text-danger">*</span></label>
                                <select class="form-select" id="recipePatient" required>
                                    <option value="">Seleccionar paciente</option>
                                    <!-- Los pacientes se cargarán dinámicamente -->
                                </select>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="recipeDateOfIssue" class="form-label">Fecha de Emisión <span
                                        class="text-danger">*</span></label>
                                <input type="date" class="form-control" id="recipeDateOfIssue" required>
                            </div>
                        </div>

                        <!-- Distancia (Lejos) -->
                        <div class="card mb-4">
                            <div class="card-header bg-light">
                                <h6 class="mb-0"><i class="fas fa-eye me-2"></i>Distancia (Lejos)</h6>
                            </div>
                            <div class="card-body">
                                <div class="row">
                                    <div class="col-md-6">
                                        <h6 class="text-muted mb-3">Ojo Derecho (O.D.)</h6>
                                        <div class="row">
                                            <div class="col-md-4 mb-3">
                                                <label class="form-label">Esférico</label>
                                                <input type="number" step="0.25" class="form-control"
                                                       id="rightEyeSphericalDistanceFar" placeholder="0.00">
                                            </div>
                                            <div class="col-md-4 mb-3">
                                                <label class="form-label">Cilindro</label>
                                                <input type="number" step="0.25" class="form-control"
                                                       id="rightEyeCylinderDistanceFar" placeholder="0.00">
                                            </div>
                                            <div class="col-md-4 mb-3">
                                                <label class="form-label">Eje</label>
                                                <input type="number" class="form-control"
                                                       id="rightEyeAxisDistanceFar" placeholder="0">
                                            </div>
                                        </div>
                                    </div>
                                    <div class="col-md-6">
                                        <h6 class="text-muted mb-3">Ojo Izquierdo (O.I.)</h6>
                                        <div class="row">
                                            <div class="col-md-4 mb-3">
                                                <label class="form-label">Esférico</label>
                                                <input type="number" step="0.25" class="form-control"
                                                       id="leftEyeSphericalDistanceFar" placeholder="0.00">
                                            </div>
                                            <div class="col-md-4 mb-3">
                                                <label class="form-label">Cilindro</label>
                                                <input type="number" step="0.25" class="form-control"
                                                       id="leftEyeCylinderDistanceFar" placeholder="0.00">
                                            </div>
                                            <div class="col-md-4 mb-3">
                                                <label class="form-label">Eje</label>
                                                <input type="number" class="form-control"
                                                       id="leftEyeAxisDistanceFar" placeholder="0">
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                <div class="row">
                                    <div class="col-md-6">
                                        <label class="form-label">Distancia Pupilar</label>
                                        <input type="number" step="0.5" class="form-control"
                                               id="pupillaryDistanceFar" placeholder="0.0">
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Cerca -->
                        <div class="card mb-4">
                            <div class="card-header bg-light">
                                <h6 class="mb-0"><i class="fas fa-book-open me-2"></i>Cerca</h6>
                            </div>
                            <div class="card-body">
                                <div class="row">
                                    <div class="col-md-6">
                                        <h6 class="text-muted mb-3">Ojo Derecho (O.D.)</h6>
                                        <div class="row">
                                            <div class="col-md-4 mb-3">
                                                <label class="form-label">Esférico</label>
                                                <input type="number" step="0.25" class="form-control"
                                                       id="rightEyeSphericalDistanceNear"
                                                       placeholder="0.00">
                                            </div>
                                            <div class="col-md-4 mb-3">
                                                <label class="form-label">Cilindro</label>
                                                <input type="number" step="0.25" class="form-control"
                                                       id="rightEyeCylinderDistanceNear" placeholder="0.00">
                                            </div>
                                            <div class="col-md-4 mb-3">
                                                <label class="form-label">Eje</label>
                                                <input type="number" class="form-control"
                                                       id="rightEyeAxisDistanceNear" placeholder="0">
                                            </div>
                                        </div>
                                    </div>
                                    <div class="col-md-6">
                                        <h6 class="text-muted mb-3">Ojo Izquierdo (O.I.)</h6>
                                        <div class="row">
                                            <div class="col-md-4 mb-3">
                                                <label class="form-label">Esférico</label>
                                                <input type="number" step="0.25" class="form-control"
                                                       id="leftEyeSphericalDistanceNear" placeholder="0.00">
                                            </div>
                                            <div class="col-md-4 mb-3">
                                                <label class="form-label">Cilindro</label>
                                                <input type="number" step="0.25" class="form-control"
                                                       id="leftEyeCylinderDistanceNear" placeholder="0.00">
                                            </div>
                                            <div class="col-md-4 mb-3">
                                                <label class="form-label">Eje</label>
                                                <input type="number" class="form-control"
                                                       id="leftEyeAxisDistanceNear" placeholder="0">
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                <div class="row">
                                    <div class="col-md-6">
                                        <label class="form-label">Distancia Pupilar</label>
                                        <input type="number" step="0.5" class="form-control"
                                               id="pupillaryDistanceNear" placeholder="0.0">
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Observaciones e Instrucciones -->
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="recipeObservation" class="form-label">Observaciones</label>
                                <textarea class="form-control" id="recipeObservation" rows="4"
                                          placeholder="Observaciones adicionales..."></textarea>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="recipeInstruction" class="form-label">Instrucciones</label>
                                <textarea class="form-control" id="recipeInstruction" rows="4"
                                          placeholder="Instrucciones para el paciente..."></textarea>
                            </div>
                        </div>

                        <div class="d-flex justify-content-end gap-2">
                            <button type="button" class="btn btn-outline-secondary"
                                    onclick="showRecipesList()">
                                <i class="fas fa-times me-2"></i>
                                Cancelar
                            </button>
                            <button type="submit" class="btn btn-red-custom">
                                <i class="fas fa-save me-2"></i>
                                Guardar Recetario
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
