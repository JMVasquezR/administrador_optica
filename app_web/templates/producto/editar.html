<div id="edit-product-form" class="products-view" style="display: none;">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold text-dark">Editar Producto</h2>
        <button class="btn btn-outline-secondary" onclick="showProductsList()">
            <i class="fas fa-arrow-left me-2"></i>
            Volver al Listado
        </button>
    </div>

    <div class="row">
        <div class="col-lg-8">
            <div class="card">
                <div class="card-header bg-white">
                    <h5 class="card-title mb-0">
                        <i class="fas fa-edit text-red-custom me-2"></i>
                        Información del Producto
                    </h5>
                </div>
                <div class="card-body">
                    <form id="editProductForm">
                        <input type="hidden" id="editProductId" value="">
                        <div class="row">
                            <div class="col-md-8 mb-3">
                                <label for="editProductName" class="form-label">Nombre del Producto <span
                                        class="text-danger">*</span></label>
                                <input type="text" class="form-control" id="editProductName"
                                       placeholder="Ej: Gafas Ray-Ban Aviator" required maxlength="250">
                            </div>
                            <div class="col-md-4 mb-3">
                                <label class="form-label">Código del Producto</label>
                                <div class="input-group">
                                                    <span class="input-group-text bg-light">
                                                        <i class="fas fa-barcode text-muted"></i>
                                                    </span>
                                    <input type="text" class="form-control bg-light" id="editProductCode"
                                           placeholder="Código del producto" readonly>
                                </div>
                                <small class="text-muted">El código no se puede modificar</small>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-4 mb-3">
                                <label for="editUnitMeasure" class="form-label">Unidad de Medida <span
                                        class="text-danger">*</span></label>
                                <select class="form-select" id="editUnitMeasure" required>
                                    <option value="">Seleccionar unidad</option>
                                    <option value="UNIDAD">Unidad</option>
                                    <option value="PAR">Par</option>
                                    <option value="CAJA">Caja</option>
                                    <option value="PAQUETE">Paquete</option>
                                    <option value="BOTELLA">Botella</option>
                                    <option value="METRO">Metro</option>
                                    <option value="LITRO">Litro</option>
                                </select>
                            </div>
                            <div class="col-md-4 mb-3">
                                <label for="editBrand" class="form-label">Marca</label>
                                <select class="form-select" id="editBrand">
                                    <option value="">Seleccionar marca (Opcional)</option>
                                    <!-- Las marcas se cargarán dinámicamente -->
                                </select>
                            </div>
                            <div class="col-md-4 mb-3">
                                <label for="editCategory" class="form-label">Categoría <span
                                        class="text-danger">*</span></label>
                                <select class="form-select" id="editCategory" required>
                                    <option value="">Seleccionar categoría</option>
                                    <!-- Las categorías se cargarán dinámicamente -->
                                </select>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="editPrice" class="form-label">Precio (S/)</label>
                                <div class="input-group">
                                    <span class="input-group-text">S/</span>
                                    <input type="number" class="form-control" id="editPrice"
                                           placeholder="0.00"
                                           step="0.01" min="0">
                                </div>
                                <small class="text-muted">Precio unitario del producto</small>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="editStock" class="form-label">Stock</label>
                                <input type="number" class="form-control" id="editStock" placeholder="0"
                                       min="0"
                                       value="0">
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="editDescription" class="form-label">Descripción</label>
                            <textarea class="form-control" id="editDescription" rows="4"
                                      placeholder="Descripción detallada del producto..."></textarea>
                            <small class="text-muted">Descripción del producto</small>
                        </div>

                        <div class="d-flex justify-content-end gap-2">
                            <button type="button" class="btn btn-outline-secondary"
                                    onclick="showProductsList()">
                                <i class="fas fa-times me-2"></i>
                                Cancelar
                            </button>
                            <button type="submit" class="btn btn-red-custom">
                                <i class="fas fa-save me-2"></i>
                                Actualizar Producto
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <div class="col-lg-4">
            <div class="card">
                <div class="card-header bg-white">
                    <h6 class="card-title mb-0">
                        <i class="fas fa-info-circle text-red-custom me-2"></i>
                        Estado del Producto
                    </h6>
                </div>
                <div class="card-body">
                    <div class="mb-3">
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="editStatus"
                                   id="editStatusActive"
                                   value="active">
                            <label class="form-check-label" for="editStatusActive">
                                <i class="fas fa-check-circle text-success me-1"></i>
                                Activo
                            </label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="editStatus"
                                   id="editStatusInactive"
                                   value="inactive">
                            <label class="form-check-label" for="editStatusInactive">
                                <i class="fas fa-pause-circle text-warning me-1"></i>
                                Inactivo
                            </label>
                        </div>
                    </div>

                    <div class="alert alert-warning">
                        <i class="fas fa-exclamation-triangle me-2"></i>
                        <strong>Atención:</strong>
                        <ul class="mb-0 mt-2">
                            <li>Los campos marcados con <span class="text-danger">*</span> son obligatorios
                            </li>
                            <li>Los cambios se aplicarán inmediatamente</li>
                            <li>Verifica los datos antes de guardar</li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
