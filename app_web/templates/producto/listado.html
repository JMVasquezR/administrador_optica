<div id="products-list" class="products-view">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold text-dark">Gestión de Productos</h2>
        <button class="btn btn-red-custom" onclick="showAddProductForm()">
            <i class="fas fa-plus me-2"></i>
            Agregar Producto
        </button>
    </div>

    <!-- Search and Filters -->
    <div class="card mb-4">
        <div class="card-body">
            <div class="row">
                <div class="col-md-4 mb-3">
                    <label class="form-label">Buscar producto</label>
                    <div class="position-relative">
                        <i class="fas fa-search position-absolute top-50 start-0 translate-middle-y ms-3 text-muted"></i>
                        <input type="text" class="form-control ps-5" placeholder="Nombre o código..."
                               id="searchProduct">
                    </div>
                </div>
                <div class="col-md-3 mb-3">
                    <label class="form-label">Categoría</label>
                    <select class="form-select" id="filterCategory">
                        <option value="">Todas las categorías</option>
                        <!-- Las categorías se cargarán dinámicamente -->
                    </select>
                </div>
                <div class="col-md-3 mb-3">
                    <label class="form-label">Marca</label>
                    <select class="form-select" id="filterBrand">
                        <option value="">Todas las marcas</option>
                        <!-- Las marcas se cargarán dinámicamente -->
                    </select>
                </div>
                <div class="col-md-2 mb-3">
                    <label class="form-label">&nbsp;</label>
                    <button class="btn btn-outline-red-custom w-100" onclick="clearFilters()">
                        <i class="fas fa-times me-1"></i>
                        Limpiar
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Products Table -->
    <div class="card">
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-hover">
                    <thead class="table-light">
                    <tr>
                        <th>Nombre</th>
                        <th>Código</th>
                        <th>Unidad de Medida</th>
                        <th>Marca</th>
                        <th>Precio</th>
                        <th>Categoría</th>
                        <th>Stock</th>
                        <th>Acciones</th>
                    </tr>
                    </thead>
                    <tbody id="productsTableBody">
                    <!-- Los productos se cargarán dinámicamente aquí -->
                    </tbody>
                </table>
            </div>

            <!-- Pagination Info and Controls -->
            <nav aria-label="Paginación de productos" class="mt-4">
                <ul class="pagination justify-content-center">
                    <!-- La paginación se generará dinámicamente aquí -->
                </ul>
            </nav>
        </div>
    </div>
</div>
